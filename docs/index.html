<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Barrikade</title>

<style>
*{
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:15px;
    padding-left:max(15px, env(safe-area-inset-left));
    padding-right:max(15px, env(safe-area-inset-right));
    padding-bottom:max(15px, env(safe-area-inset-bottom));
    text-align:center;
}

h1{
    margin-bottom:10px;
}

#total{
    font-size:48px;
    font-weight:bold;
    margin:20px 0;
}

.buttons{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.buttons button{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
}

.btn-count{
    position:absolute;
    left:10px;
    min-width:32px;
    padding:0;
    font-weight:bold;
    opacity:0.7;
    text-align:center;
}

.btn-label{
    width:100%;
    text-align:center;
}

.alkfrei .btn-count{ color:rgba(0,0,0,0.65); }

button{
    padding:20px;
    font-size:22px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    touch-action:manipulation;
}

.cocktail{background:black;color:white;}
.longdrink{background:#2196f3;color:white;}
.aperitif{background:#9c27b0;color:white;}
.shot{background:#f44336;color:white;}
.alkfrei{background:white;color:black;border:2px solid #ccc;}
.sekt{background:orange;color:white;}
.pfand{background:#4caf50;color:white;}

.actions{
    margin-top:15px;
    display:flex;
    gap:10px;
}

.actions button{
    flex:1;
}

#circles{
    margin-top:25px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
}

.circle{
    width:85px;
    height:85px;
    border-radius:50%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-weight:bold;
    cursor:pointer;
}

.label{
    font-size:12px;
}

.count{
    font-size:24px;
}

@media (max-width: 480px){
    body{
        padding:10px;
        padding-left:max(10px, env(safe-area-inset-left));
        padding-right:max(10px, env(safe-area-inset-right));
        padding-bottom:max(12px, env(safe-area-inset-bottom));
    }

    h1{
        margin:6px 0;
        font-size:24px;
    }

    #total{
        font-size:38px;
        margin:12px 0;
    }

    .buttons{
        gap:8px;
    }

    button{
        padding:16px 10px;
        min-height:58px;
        font-size:18px;
        border-radius:10px;
    }

    .actions{
        margin-top:10px;
        gap:8px;
    }

    #circles{
        margin-top:14px;
        gap:10px;
    }

    .circle{
        width:72px;
        height:72px;
    }

    .count{
        font-size:20px;
    }

    .label{
        font-size:10px;
    }
}

@media (max-width: 380px){
    #total{
        font-size:34px;
    }

    button{
        padding:14px 8px;
        min-height:54px;
        font-size:16px;
    }

    .circle{
        width:66px;
        height:66px;
    }

    .count{
        font-size:18px;
    }
}
</style>
</head>

<body>

<h1>Barrikade Abiball</h1>

<div id="total">0,00 €</div>

<div class="buttons">
    <button class="cocktail" data-item="Cocktail" data-label="Cocktail" onclick="add('Cocktail')">Cocktail</button>
    <button class="longdrink" data-item="Longdrink" data-label="Longdrink" onclick="add('Longdrink')">Longdrink</button>

    <button class="aperitif" data-item="Aperitif" data-label="Aperitif" onclick="add('Aperitif')">Aperitif</button>
    <button class="shot" data-item="Shot" data-label="Shot" onclick="add('Shot')">Shot</button>

    <button class="alkfrei" data-item="Alkoholfrei" data-label="Alkoholfrei" onclick="add('Alkoholfrei')">Alkoholfrei</button>
    <button class="sekt" data-item="Sekt" data-label="Sekt" onclick="add('Sekt')">Sekt</button>

    <button class="pfand" data-item="Pfand" data-label="Becherpfand" onclick="add('Pfand')">Becherpfand</button>
</div>

<div class="actions">
    <button onclick="undo()" aria-label="Zurück" title="Zurück">↶</button>
    <button onclick="resetCash()" aria-label="Neue Bestellung" title="Neue Bestellung">🗑️</button>
</div>

<div id="circles"></div>

<script>

const prices = {
    Cocktail:7,
    Longdrink:6.5,
    Aperitif:6,
    Shot:2,
    Alkoholfrei:5,
    Sekt:4,
    Pfand:-2
};

const colors = {
    Cocktail:"black",
    Longdrink:"#2196f3",
    Aperitif:"#9c27b0",
    Shot:"#f44336",
    Alkoholfrei:"white",
    Sekt:"orange",
    Pfand:"#4caf50"
};

let counts = {};
let history = [];
let lastResetState = null;

Object.keys(prices).forEach(x=>counts[x]=0);

function add(item){
    lastResetState = null;
    counts[item]++;
    history.push(item);
    render();
}

function remove(item){
    if(counts[item] > 0){
        lastResetState = null;
        counts[item]--;
        render();
    }
}

function undo(){
    const last = history.pop();
    if(last){
        counts[last]--;
        render();
        return;
    }

    if(lastResetState){
        counts = {...lastResetState.counts};
        history = [...lastResetState.history];
        lastResetState = null;
        render();
    }
}

function resetCash(){
    lastResetState = {
        counts: {...counts},
        history: [...history]
    };
    Object.keys(counts).forEach(x=>counts[x]=0);
    history=[];
    render();
}

function render(){

    let total = 0;

    Object.keys(counts).forEach(item=>{
        total += counts[item] * prices[item];
    });

    document.getElementById("total").innerText =
        total.toFixed(2).replace(".",",") + " €";

    document.querySelectorAll(".buttons button[data-item]").forEach(button=>{
        const item = button.dataset.item;
        const label = button.dataset.label;
        button.innerHTML = `
            <span class="btn-count">${counts[item]}</span>
            <span class="btn-label">${label}</span>
        `;
    });

    const circles = document.getElementById("circles");
    circles.innerHTML = "";

    Object.keys(counts).forEach(item=>{

        const div = document.createElement("div");
        div.className = "circle";

        div.style.background = colors[item];

        if(item === "Alkoholfrei"){
            div.style.border = "2px solid black";
        }

        if(item === "Cocktail" ||
           item === "Longdrink" ||
           item === "Aperitif" ||
           item === "Shot" ||
           item === "Sekt" ||
           item === "Pfand"){
            div.style.color = "white";
        }

        div.innerHTML = `
            <div class="count">${counts[item]}</div>
            <div class="label">${item}</div>
        `;

        div.onclick = ()=>remove(item);

        circles.appendChild(div);
    });
}

render();

</script>

</body>
</html>
